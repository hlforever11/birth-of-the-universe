<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0;url=https://hlforever11.github.io/reference-checker/">
  <title>正在前往文证 · 参考文献核验</title>
  <script>
    (() => {
      const target = new URL('https://hlforever11.github.io/reference-checker/');
      target.search = location.search;
      target.hash = location.hash;
      location.replace(target.href);
    })();
  </script>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:#24313a;background:#f4f7f5}
    body{min-height:100vh;display:grid;place-items:center;margin:0;padding:24px;box-sizing:border-box}
    main{max-width:520px;text-align:center;background:#fff;border:1px solid #dfe7e2;border-radius:20px;padding:32px;box-shadow:0 18px 50px rgba(31,55,43,.08)}
    a{color:#176b52}
  </style>
</head>
<body>
  <main>
    <p>网站已迁移，正在自动前往新网址……</p>
    <p><a id="fallback" href="https://hlforever11.github.io/reference-checker/">如未自动跳转，请点击这里</a></p>
  </main>
  <script>
    const fallback = document.getElementById('fallback');
    const target = new URL(fallback.href);
    target.search = location.search;
    target.hash = location.hash;
    fallback.href = target.href;
  </script>
</body>
</html>
